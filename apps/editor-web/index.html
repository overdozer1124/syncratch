<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockSync Editor</title>
    <!-- Start downloading the large Scratch bundle while the shell paints. -->
    <link
      rel="preload"
      as="script"
      href="%BASE_URL%generated/gui/scratch-gui-standalone.js"
    />
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #scratch-gui {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        background: #e8eef5;
      }
      #scratch-gui.gui-loading::before {
        content: "エディターを読み込み中…";
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        color: #16324f;
        font-size: 1.05rem;
        font-weight: 650;
        letter-spacing: 0.01em;
        background:
          radial-gradient(circle at 20% 20%, #fff8 0, transparent 40%),
          linear-gradient(160deg, #d7e6f5, #eef3f8 55%, #dfeaf5);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <header class="toolbar">
        <input aria-label="Project title" id="project-title" value="Local project" />
        <button id="new-project" type="button">New</button>
        <button id="open-project" type="button">Open on this device</button>
        <input id="open-file" type="file" accept=".sb3" hidden />
        <button id="download-project" type="button">Download to this device</button>
        <button id="save-project" type="button">Save locally</button>
        <span
          aria-atomic="true"
          aria-live="polite"
          class="project-status"
          id="project-status"
          role="status"
        >
          <span data-testid="save-status" id="save-status">Starting…</span>
          <span
            class="status-details"
            data-testid="project-status-details"
            id="project-status-details"
            hidden
          ></span>
        </span>
        <button id="retry-save" type="button" hidden>Retry save</button>
        <span class="drive-controls">
          <button id="connect-google" type="button" disabled>Connect Google</button>
          <button id="open-drive" type="button" disabled>Open Google Drive</button>
          <button id="save-drive" type="button" disabled>Save to Google Drive</button>
          <button id="disconnect-google" type="button" disabled>Disconnect</button>
          <span aria-hidden="true" class="status-secondary" data-testid="drive-status" id="drive-status">Not configured</span>
        </span>
        <span class="collab-controls">
          <button id="create-room" type="button" disabled>Create room</button>
          <input
            aria-label="Collaboration invite"
            id="collab-invite"
            placeholder="Paste collaboration invite"
          />
          <button id="join-room" type="button" disabled>Join invite</button>
          <button id="copy-invite" type="button" disabled>Copy invite</button>
          <button id="leave-room" type="button" disabled>Leave room</button>
          <button id="collab-reconnect" type="button" hidden>再接続</button>
          <button id="collab-retry-save" type="button" hidden>保存を再試行</button>
          <button id="collab-download-sb3" type="button" hidden>SB3をダウンロード</button>
          <button id="collab-diagnostics" type="button" hidden>診断情報</button>
          <span aria-hidden="true" class="status-secondary" data-testid="collab-status" id="collab-status">Solo</span>
        </span>
      </header>
      <section
        aria-busy="true"
        class="gui-loading"
        data-testid="scratch-gui"
        id="scratch-gui"
      ></section>
    </main>
    <script>
      // Scratch GUI webpack assets resolve against this prefix (see prepare-assets).
      (function () {
        var base = new URL("./", document.baseURI || location.href).pathname;
        if (!base.endsWith("/")) base += "/";
        window.__BLOCKSYNC_GUI_PUBLIC_PATH__ = base;
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
