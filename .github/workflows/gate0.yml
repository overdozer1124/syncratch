name: Gate 0

on:
  push:
  pull_request:

jobs:
  gate0:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install workspace (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install + build vendor Scratch VM (pinned)
        run: |
          cd vendor/scratch-editor
          npm ci --ignore-scripts
          cd ../..
          pnpm gate0:build-vendor-vm

      - name: Verify submodule pin, cleanliness, VM dist
        run: pnpm gate0:check-pin

      - name: TypeScript build
        run: pnpm build

      - name: License inventory present
        run: pnpm gate0:check-licenses

      - name: Package tests
        run: pnpm gate0:test
        env:
          NODE_ENV: test

      - name: WebSocket collab (incl. multi-process)
        run: pnpm gate0:collab
        env:
          NODE_ENV: test

      - name: Auth smoke (skips without GOOGLE_CLIENT_ID)
        run: pnpm --filter @blocksync/gate0-auth-smoke test
        env:
          NODE_ENV: test
