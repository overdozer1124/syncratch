# Railway verification deploy: static editor + same-origin signaling (/signal).
# IMPORTANT: Service Settings → Build → Builder must be "Dockerfile" (not Railpack).
# Deploy branch must contain this file (e.g. cursor/railway-collab-host-f431 until merged).
# Dashboard: enable GitHub submodules so vendor/scratch-editor is present at build.
# Set optional Docker build args / env for Drive: VITE_GOOGLE_CLIENT_ID, etc.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
